name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate skill package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          set -euo pipefail
          for f in SKILL.md README.md scripts/fs_runner.py; do
            if [ ! -f "$f" ]; then
              echo "ERROR: Missing required file: $f"
              exit 1
            fi
          done
          echo "All required files present."

      - name: Validate frontmatter has clawdbot metadata
        run: |
          set -euo pipefail
          if ! grep -q 'clawdbot' SKILL.md; then
            echo "ERROR: SKILL.md frontmatter must use metadata.clawdbot"
            exit 1
          fi
          echo "Frontmatter uses clawdbot metadata."

      - name: Validate security manifest in scripts
        run: |
          set -euo pipefail
          for script in scripts/*.py; do
            if ! grep -q 'SECURITY MANIFEST' "$script"; then
              echo "ERROR: $script is missing a SECURITY MANIFEST header"
              exit 1
            fi
          done
          echo "All scripts have security manifests."

      - name: Syntax check Python scripts
        run: |
          set -euo pipefail
          for script in scripts/*.py; do
            python3 -c "import ast; ast.parse(open('$script').read())"
            echo "OK: $script"
          done

      - name: Check no forbidden files are present
        run: |
          set -euo pipefail
          FORBIDDEN=(.env .env.local LICENSE)
          for f in "${FORBIDDEN[@]}"; do
            if [ -f "$f" ]; then
              echo "ERROR: $f should not be included in the skill package"
              exit 1
            fi
          done
          echo "No forbidden files found."

      - name: Validate SKILL.md required sections
        run: |
          set -euo pipefail
          SECTIONS=("External endpoints" "Security and privacy" "Model invocation note" "Trust statement")
          for section in "${SECTIONS[@]}"; do
            if ! grep -qi "$section" SKILL.md; then
              echo "ERROR: SKILL.md is missing required section: $section"
              exit 1
            fi
          done
          echo "All required SKILL.md sections present."

  test-script:
    name: Test runner script
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyfatsecret

      - name: Syntax check
        run: python3 -c "import ast; ast.parse(open('scripts/fs_runner.py').read())"

      - name: Verify --help works for all subcommands
        run: |
          set -euo pipefail
          python3 scripts/fs_runner.py --help
          for cmd in foods_search food_get food_get_v2 food_find_id_for_barcode \
                     foods_autocomplete food_add_favorite food_delete_favorite \
                     foods_get_favorites foods_get_most_eaten foods_get_recently_eaten \
                     food_entry_create food_entry_edit food_entry_delete \
                     food_entries_get food_entries_get_month food_entries_copy \
                     food_entries_copy_saved_meal saved_meal_create saved_meal_delete \
                     saved_meal_edit saved_meal_get saved_meal_item_add \
                     saved_meal_item_delete saved_meal_item_edit saved_meal_items_get \
                     recipes_search recipe_get recipe_types_get \
                     recipes_add_favorite recipes_delete_favorite recipes_get_favorites \
                     exercises_get exercise_entries_get exercise_entries_get_month \
                     exercise_entries_commit_day exercise_entries_save_template \
                     exercise_entry_edit profile_create profile_get_auth \
                     weight_update weights_get_month; do
            python3 scripts/fs_runner.py "$cmd" --help > /dev/null
            echo "OK: $cmd"
          done
